<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="icon" type="image/png" href="images/logo.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="app-header">

    <div class="header-overlay"></div>

    <div class="header-content">

        <img src="images/logo.png" class="logo">

        <div class="company-text">

            <h1>WaveNxD Technologies Pvt. Ltd.</h1>

            <p>Office Attendance Management System</p>

        </div>

    </div>

</header>

<div class="login-container">

    <!-- LEFT PANEL -->
    <div class="login-left">

        <div class="login-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h2>Admin Login</h2>

        <p>Secure Authentication Portal</p>

    </div>

    <!-- RIGHT PANEL -->
    <div class="login-right">

       <div class="input-box">

    <i class="fa-solid fa-user"></i>

    <input
        type="text"
        id="username"
        placeholder="Admin Username">

</div>

<div class="input-box password-box">

    <i class="fa-solid fa-lock"></i>

    <input
        type="password"
        id="password"
        placeholder="Password">

    <i
        class="fa-solid fa-eye togglePassword"
        id="togglePassword">
    </i>

</div>

        <button
id="loginBtn"
class="login-btn">

LOGIN →

</button>

<button
class="back-btn"
onclick="location.href='index.html'">

← BACK

</button>

    </div>

</div>

<script type="module" src="js/adminLogin.js"></script>
<footer class="footer">

    <p>
        © 2026 Version 1.0
        &nbsp; | &nbsp;
        Developed by <strong>OM S PATIL</strong>
    </p>

</footer>
</body>

</html>
