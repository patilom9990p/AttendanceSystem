<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Settings</title>

<link rel="icon" type="image/png" href="images/logo.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="app-header">

    <div class="header-overlay"></div>

    <div class="header-content">

        <img src="images/logo.png" class="logo">

        <div class="company-text">

            <h1>WaveNxD Technologies Pvt. Ltd.</h1>

            <p>Office Attendance Management System</p>

        </div>

    </div>

</header>

<div class="container">

<h2>📍 Office GPS Settings</h2>

<p>
Configure the office location used for Employee Check-In and Check-Out.
</p>

<br>

<label>Office Latitude</label>

<input
type="number"
id="latitude"
step="0.000001"
placeholder="18.520430">

<br><br>

<label>Office Longitude</label>

<input
type="number"
id="longitude"
step="0.000001"
placeholder="73.856743">

<br><br>

<label>Allowed Radius (Meters)</label>

<input
type="number"
id="radius"
placeholder="50">

<br><br>

<button
id="saveBtn">

💾 Save GPS Settings

</button>

<button
onclick="location.href='adminDashboard.html'">

⬅ Back

</button>

</div>

<script type="module" src="js/gpsSettings.js"></script>

<footer class="footer">

<p>

© 2026 Version 1.0 |
Developed by <strong>OM S PATIL</strong>

</p>

</footer>

</body>

</html>
