<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Dashboard</title>

<link rel="icon" type="image/png" href="images/logo.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="app-header">

    <div class="header-overlay"></div>

    <div class="header-content">

        <img src="images/logo.png" class="logo">

        <div class="company-text">

            <h1>WaveNxD Technologies Pvt. Ltd.</h1>

            <p>Office Attendance Management System</p>

        </div>

    </div>

</header>

<div class="container">

    <h2>🔒 Change Password</h2>

    <br>

    <input
        type="password"
        id="currentPassword"
        placeholder="Current Password">

    <br><br>

    <input
        type="password"
        id="newPassword"
        placeholder="New Password">

    <br><br>

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm New Password">

    <br><br>

    <button id="changeBtn">

        Change Password

    </button>

    <br><br>

    <button onclick="location.href='employeeDashboard.html'">

        ⬅ Back

    </button>

</div>

<script type="module" src="js/changePassword.js"></script>
<footer class="footer">

    <p>
        © 2026 Version 1.0
        &nbsp; | &nbsp;
        Developed by <strong>OM S PATIL</strong>
    </p>

</footer>
</body>

</html>
