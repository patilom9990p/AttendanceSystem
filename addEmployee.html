<title>Employee Dashboard</title>

<link rel="icon" type="image/png" href="images/logo.png">

</head>
<header class="app-header">

    <div class="header-overlay"></div>

    <div class="header-content">

        <img src="images/logo.png" class="logo">

        <div class="company-text">

            <h1>WaveNxD Technologies Pvt. Ltd.</h1>

            <p>Office Attendance Management System</p>

        </div>

    </div>

</header>
<body>

<div class="container">

    <h1>Add Employee</h1>

    <input type="text" id="name" placeholder="Employee Name">

    <br><br>

    <input type="text" id="college" placeholder="College (Short Form)">

    <br><br>

    <select id="type">

        <option value="">Select Type</option>

        <option>Employee</option>

        <option>Intern</option>

    </select>

    <br><br>

    <button id="saveBtn">
        Save Employee
    </button>

    <br><br>

    <button onclick="location.href='adminDashboard.html'">
        Back
    </button>

</div>

<script type="module" src="js/addEmployee.js"></script>
